
<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CI6 Connect</title>
  <meta name="description" content="Guide numérique des consignes de la 6e compagnie d'instruction" />
  <link rel="icon" href="assets/img/logo-ci6.png" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="page-shell">
    <header class="hero" id="accueil">
      <img src="assets/img/logo-ci6.png" alt="Logo de la 6e compagnie" class="logo" />
      <div class="hero-text">
        <h1><span>CI6</span> CONNECT</h1>
        <p class="subtitle">Guide numérique des consignes</p>
        <p class="motto"> À cœur vaillant, rien d’impossible </p>
      </div>
    </header>

    <main>
      <section class="search-zone" aria-label="Recherche">
        <label for="searchInput" class="sr-only">Rechercher une consigne</label>
        <input id="searchInput" type="search" placeholder="Rechercher une consigne, une rubrique…" autocomplete="off" />
      </section>

      <section class="grid" id="cards" aria-label="Rubriques CI6 Connect"></section>

      <article class="detail hidden" id="detail" aria-live="polite">
        <button class="back" id="backBtn">← Retour à l’accueil</button>
        <div class="detail-header">
          <img id="detailIcon" alt="" />
          <div>
            <p id="detailNum" class="detail-num"></p>
            <h2 id="detailTitle"></h2>
          </div>
        </div>
        <div class="markdown" id="detailContent"></div>
      </article>
    </main>

    <footer>
      <p>ROBUSTESSE · RUSTICITÉ · RÉSILIENCE </p>
      <p>6ᵉ compagnie d’instruction – École de gendarmerie de Montluçon</p>
    </footer>
  </div>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
