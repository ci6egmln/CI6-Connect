<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CI6 Connect</title>
  <meta name="description" content="Guide numérique des consignes de la 6e compagnie d'instruction">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <main class="page">
    <section id="homeView">
      <header class="hero">
        <img class="logo" src="assets/img/logo-ci6.png" alt="Logo de la 6e compagnie">
        <div class="brand">
          <h1 class="brand-title"><span class="ci6">CI6</span> <span class="connect">Connect</span></h1>
          <p class="brand-subtitle">Guide numérique des consignes</p>
          <p class="brand-unit">6e compagnie d’instruction</p>
          <div class="separator">◆</div>
          <p class="motto">« À cœur vaillant, rien d’impossible »</p>
        </div>
      </header>

      <div class="search-wrap">
        <input id="searchInput" class="search" type="search" placeholder="Rechercher une consigne, une rubrique..." aria-label="Rechercher une rubrique">
      </div>

      <section id="cardsGrid" class="cards-grid" aria-label="Rubriques"></section>

      <footer class="footer">
        <p>Robustesse · Rusticité · Résilience</p>
        <p>6e compagnie d’instruction – École de gendarmerie - 95 avenue Jules Guesde, 03100 Monluçon</p>
      </footer>
    </section>

    <section id="detailView" class="detail" hidden>
      <button id="backBtn" class="back-btn">← Retour à l’accueil</button>
      <article id="detailContent"></article>
    </section>
  </main>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
